<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- Stylised "O" with a spark/wand inside -->
  <!-- Envelope shape -->
  <rect x="12" y="20" width="40" height="28" rx="4" fill="none" stroke="white" stroke-width="3"/>
  <polyline points="12,20 32,36 52,20" fill="none" stroke="white" stroke-width="3" stroke-linejoin="round"/>
  <!-- Spark dot top-right -->
  <circle cx="46" cy="16" r="5" fill="#A78BFA"/>
  <line x1="46" y1="9" x2="46" y2="7" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="23" x2="46" y2="25" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="39" y1="16" x2="37" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="53" y1="16" x2="55" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
